version: '3.8'

services:

  eureka-server:
    build: ./backend/eureka-server
    ports: ["8761:8761"]
    networks: [smartrent-network]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./backend/api-gateway
    ports: ["8080:8080"]
    depends_on: [eureka-server]
    environment:
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JWT_SECRET=${JWT_SECRET}
    networks: [smartrent-network]

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${DB_ROOT_PASSWORD}
      ACCEPT_EULA: "Y"
    ports: ["14333:1433"]
    volumes: [db_data:/var/opt/mssql]
    networks: [smartrent-network]
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_ROOT_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  sql-server-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    networks: [smartrent-network]
    depends_on:
      sql-server:
        condition: service_healthy
    command: /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S sql-server -U sa -P '${DB_ROOT_PASSWORD}' -C -Q 'CREATE DATABASE users_db; CREATE DATABASE properties_db; CREATE DATABASE visits_db; CREATE DATABASE rentals_db;'"

  user-service:
    build: ./backend/user-service
    depends_on:
      eureka-server:
        condition: service_started
      sql-server-init:
        condition: service_completed_successfully
    environment:
      - DB_HOST=sql-server
      - DB_PASSWORD=${DB_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks: [smartrent-network]

  property-service:
    build: ./backend/property-service
    depends_on:
      eureka-server:
        condition: service_started
      sql-server-init:
        condition: service_completed_successfully
    environment:
      - DB_HOST=sql-server
      - DB_PASSWORD=${DB_ROOT_PASSWORD}
      - EUREKA_URI=http://eureka-server:8761/eureka
    volumes: [uploads_data:/app/uploads]
    networks: [smartrent-network]

  visit-service:
    build: ./backend/visit-service
    depends_on:
      eureka-server:
        condition: service_started
      sql-server-init:
        condition: service_completed_successfully
    environment:
      - DB_HOST=sql-server
      - DB_PASSWORD=${DB_ROOT_PASSWORD}
      - EUREKA_URI=http://eureka-server:8761/eureka
    networks: [smartrent-network]

  rental-service:
    build: ./backend/rental-service
    depends_on:
      eureka-server:
        condition: service_started
      sql-server-init:
        condition: service_completed_successfully
    environment:
      - DB_HOST=sql-server
      - DB_PASSWORD=${DB_ROOT_PASSWORD}
      - EUREKA_URI=http://eureka-server:8761/eureka
    volumes: [uploads_data:/app/uploads]
    networks: [smartrent-network]

  frontend:
    build: ./smartrent-frontend
    ports: ["3000:80"]
    volumes:
      - ./smartrent-frontend:/app
      - /app/node_modules
    networks: [smartrent-network]

volumes:
  db_data:
  uploads_data:

networks:
  smartrent-network:
    driver: bridge
